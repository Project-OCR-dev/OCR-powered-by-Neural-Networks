<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultats OCR</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/results.css') }}" />
</head>
<body>
    <header>
        <h1>Résultats de l'analyse</h1>
    </header>
    
    <div class="container">
        <!-- MODE UTILISÉ -->
        <div class="mode-section">
            <h3>Mode d'analyse</h3>
            <p class="mode-badge">{{ type_ocr }}</p>
        </div>
        
        <!-- IMAGE ANALYSÉE -->
        <div id="image">
            <h2>Image analysée : {{ filename }}</h2>
            <img src="{{ url_for('static', filename='uploads/' + filename) }}" 
                 alt="Image analysée">
        </div>
        
        <!-- RÉSULTATS -->
        <div id="prediction">
            <h2>Texte reconnu</h2>
            <div class="resultat-box">{{ prediction }}</div>
            
            {% if confidence %}
            <h3>Confiance : {{ confidence }}%</h3>
            {% endif %}
            
            <a href="{{ url_for('index') }}" id="retourIndexBtn">
                Analyser une autre image
            </a>
        </div>
    </div>
</body>
</html>
