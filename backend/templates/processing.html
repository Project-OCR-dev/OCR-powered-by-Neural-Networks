<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Traitement en cours...</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/process.css') }}" />
</head>
<script src="{{ url_for('static', filename='js/scriptProcess.js') }}"></script>
<body>
    <!-- MESSAGES FLASH -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
            <div class="flash {{ category }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
    {% endwith %}
    <div class="container">
        <h1>Traitement en cours...</h1>
        <h2>Analyse de : {{ filename }}</h2>
    </div>
        <img src="{{ url_for('static', filename='uploads/' + filename) }}">

</body>
</html>
