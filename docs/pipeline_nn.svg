<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 1380" width="780" height="1380" font-family="monospace, sans-serif">

  <!-- Background -->
  <rect width="780" height="1380" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="390" y="38" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="bold">Pipeline CNN — predict_image(matrix)</text>

  <!-- ===== ARROW MARKER ===== -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#34d399"/>
    </marker>
  </defs>

  <!-- ===== 1. INPUT ===== -->
  <rect x="240" y="60" width="300" height="64" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="390" y="86" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">INPUT</text>
  <text x="390" y="106" text-anchor="middle" fill="#94a3b8" font-size="11">matrix  —  numpy (30, 30)  float32  [0–1]</text>

  <!-- arrow -->
  <line x1="390" y1="124" x2="390" y2="152" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="142" fill="#475569" font-size="10">forward(matrix)</text>

  <!-- ===== 2. CONV1 ===== -->
  <rect x="160" y="155" width="460" height="72" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="390" y="178" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold">CONV 1</text>
  <text x="390" y="197" text-anchor="middle" fill="#94a3b8" font-size="11">convolution(map, 32, K1)   —   K1 : (32, 1, 3, 3)</text>
  <text x="390" y="215" text-anchor="middle" fill="#64748b" font-size="10">30×30  →  28×28  ×32 feature maps   (correlate2d valid)</text>

  <!-- arrow -->
  <line x1="390" y1="227" x2="390" y2="252" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 3. RELU 1 ===== -->
  <rect x="290" y="255" width="200" height="44" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="275" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold">ReLU</text>
  <text x="390" y="291" text-anchor="middle" fill="#64748b" font-size="10">max(0, x)   sur 32 feature maps 28×28</text>

  <!-- arrow -->
  <line x1="390" y1="299" x2="390" y2="324" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 4. MAXPOOL 1 ===== -->
  <rect x="250" y="327" width="280" height="52" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="390" y="348" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="bold">MAX POOLING 1</text>
  <text x="390" y="366" text-anchor="middle" fill="#64748b" font-size="10">28×28  →  14×14   (fenêtre 2×2, stride 2)</text>

  <!-- arrow -->
  <line x1="390" y1="379" x2="390" y2="407" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="397" fill="#475569" font-size="10">32 × (14×14)</text>

  <!-- ===== 5. CONV2 ===== -->
  <rect x="160" y="410" width="460" height="72" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="390" y="433" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold">CONV 2</text>
  <text x="390" y="452" text-anchor="middle" fill="#94a3b8" font-size="11">convolution(fmaps, 64, K2, canaux=32)   —   K2 : (64, 32, 3, 3)</text>
  <text x="390" y="470" text-anchor="middle" fill="#64748b" font-size="10">14×14  →  12×12  ×64 feature maps   (somme sur 32 canaux)</text>

  <!-- arrow -->
  <line x1="390" y1="482" x2="390" y2="507" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 6. RELU 2 ===== -->
  <rect x="290" y="510" width="200" height="44" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="390" y="530" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="bold">ReLU</text>
  <text x="390" y="546" text-anchor="middle" fill="#64748b" font-size="10">max(0, x)   sur 64 feature maps 12×12</text>

  <!-- arrow -->
  <line x1="390" y1="554" x2="390" y2="579" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 7. MAXPOOL 2 ===== -->
  <rect x="250" y="582" width="280" height="52" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="390" y="603" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="bold">MAX POOLING 2</text>
  <text x="390" y="621" text-anchor="middle" fill="#64748b" font-size="10">12×12  →  6×6   (fenêtre 2×2, stride 2)</text>

  <!-- arrow -->
  <line x1="390" y1="634" x2="390" y2="662" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="652" fill="#475569" font-size="10">64 × (6×6)</text>

  <!-- ===== 8. FLATTEN ===== -->
  <rect x="270" y="665" width="240" height="44" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="390" y="685" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="bold">FLATTEN</text>
  <text x="390" y="701" text-anchor="middle" fill="#64748b" font-size="10">64 × 6 × 6  =  2304 valeurs</text>

  <!-- arrow -->
  <line x1="390" y1="709" x2="390" y2="737" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 9. FC1 ===== -->
  <rect x="200" y="740" width="380" height="64" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="390" y="763" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">FULLY CONNECTED 1</text>
  <text x="390" y="781" text-anchor="middle" fill="#94a3b8" font-size="11">W1 (256×2304) · flat + b1  →  256</text>
  <text x="390" y="797" text-anchor="middle" fill="#fcd34d" font-size="10">ReLU</text>

  <!-- arrow -->
  <line x1="390" y1="804" x2="390" y2="832" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="822" fill="#475569" font-size="10">x1 : (256,)</text>

  <!-- ===== 10. FC2 ===== -->
  <rect x="200" y="835" width="380" height="64" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="390" y="858" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">FULLY CONNECTED 2</text>
  <text x="390" y="876" text-anchor="middle" fill="#94a3b8" font-size="11">W2 (128×256) · x1 + b2  →  128</text>
  <text x="390" y="892" text-anchor="middle" fill="#fcd34d" font-size="10">ReLU</text>

  <!-- arrow -->
  <line x1="390" y1="899" x2="390" y2="927" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="917" fill="#475569" font-size="10">x2 : (128,)</text>

  <!-- ===== 11. FC3 ===== -->
  <rect x="200" y="930" width="380" height="64" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
  <text x="390" y="953" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="bold">FULLY CONNECTED 3</text>
  <text x="390" y="971" text-anchor="middle" fill="#94a3b8" font-size="11">W3 (62×128) · x2 + b3  →  62 logits</text>
  <text x="390" y="987" text-anchor="middle" fill="#64748b" font-size="10">pas d'activation (logits bruts)</text>

  <!-- arrow -->
  <line x1="390" y1="994" x2="390" y2="1022" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="410" y="1012" fill="#475569" font-size="10">x3 : (62,)</text>

  <!-- ===== 12. ARGMAX ===== -->
  <rect x="270" y="1025" width="240" height="44" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="390" y="1045" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="bold">np.argmax(x3)</text>
  <text x="390" y="1061" text-anchor="middle" fill="#64748b" font-size="10">indice de la classe max  ∈  [0, 61]</text>

  <!-- arrow -->
  <line x1="390" y1="1069" x2="390" y2="1097" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== 13. CLASSES LOOKUP ===== -->
  <rect x="220" y="1100" width="340" height="52" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="390" y="1122" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="bold">CLASSES[index]</text>
  <text x="390" y="1140" text-anchor="middle" fill="#64748b" font-size="10">"0123456789ABCDE...xyz"  —  62 caractères</text>

  <!-- arrow green -->
  <line x1="390" y1="1152" x2="390" y2="1180" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ===== 14. OUTPUT ===== -->
  <rect x="270" y="1183" width="240" height="52" rx="8" fill="#064e3b" stroke="#34d399" stroke-width="2"/>
  <text x="390" y="1205" text-anchor="middle" fill="#34d399" font-size="13" font-weight="bold">PREDICTION</text>
  <text x="390" y="1223" text-anchor="middle" fill="#6ee7b7" font-size="11">str  —  un caractère prédit</text>

  <!-- ===== LEGEND ===== -->
  <rect x="30" y="1265" width="720" height="90" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="390" y="1284" text-anchor="middle" fill="#475569" font-size="10" font-weight="bold">LÉGENDE</text>
  <rect x="50"  y="1293" width="12" height="12" rx="2" fill="#8b5cf6"/>
  <text x="68"  y="1304" fill="#94a3b8" font-size="10">Convolution</text>
  <rect x="160" y="1293" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="178" y="1304" fill="#94a3b8" font-size="10">Activation ReLU</text>
  <rect x="300" y="1293" width="12" height="12" rx="2" fill="#06b6d4"/>
  <text x="318" y="1304" fill="#94a3b8" font-size="10">Max Pooling</text>
  <rect x="430" y="1293" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="448" y="1304" fill="#94a3b8" font-size="10">Fully Connected</text>
  <rect x="580" y="1293" width="12" height="12" rx="2" fill="#f97316"/>
  <text x="598" y="1304" fill="#94a3b8" font-size="10">Décodage</text>
  <text x="390" y="1338" text-anchor="middle" fill="#334155" font-size="10">Entrée : 30×30 float32 normalisé [0–1]  ·  Poids chargés depuis params_epoch_N.pkl  ·  62 classes (0-9, A-Z, a-z)</text>

</svg>
